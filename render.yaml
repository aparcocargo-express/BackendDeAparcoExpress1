services:
  - type: web
    name: logistica-camiones
    runtime: python
    buildCommand: "pip install --upgrade pip setuptools wheel && pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --log-file -"
    healthCheckPath: "/dashboard"
    autoDeploy: true
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: logistica-db
          property: connectionString
databases:
  - name: logistica-db
    plan: free
 
