version: "3.9"
services:
  web:
    build: .
    container_name: logistica-web
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - PORT=8000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/logistica
    depends_on:
      db:
        condition: service_healthy
    command: ["gunicorn", "app:app", "--bind", "0.0.0.0:8000", "--log-file", "-"]
    # Descomenta para migrar desde un SQLite local:
    # volumes:
    #   - ./logistica.db:/app/logistica.db
  db:
    image: postgres:15
    container_name: logistica-db
    environment:
      - POSTGRES_DB=logistica
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logistica"]
      interval: 5s
      timeout: 3s
      retries: 15
volumes:
  pgdata:
