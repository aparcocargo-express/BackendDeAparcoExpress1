<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Cambio de Aceite</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2 class="mb-4">Editar Cambio de Aceite</h2>

    <form action="{{ url_for('editar_cambio_aceite', id=cambio.id) }}" method="POST" class="card p-4 shadow-sm">
        <div class="row mb-3">
            <div class="col-md-4">
                <label for="camion_id" class="form-label">Camión</label>
                <select name="camion_id" class="form-select" required>
                    {% for camion in camiones %}
                        <option value="{{ camion.id }}" {% if camion.id == cambio.camion_id %}selected{% endif %}>
                            {{ camion.placa }} - {{ camion.modelo }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label for="fecha" class="form-label">Fecha</label>
                <input type="date" name="fecha" class="form-control" value="{{ cambio.fecha }}" required>
            </div>
            <div class="col-md-4">
                <label for="kilometraje" class="form-label">Kilometraje</label>
                <input type="number" name="kilometraje" class="form-control" value="{{ cambio.kilometraje }}" required>
            </div>
        </div>

        <div class="row mb-3">
            <div class="col-md-6">
                <label for="proximo_cambio" class="form-label">Próximo Cambio</label>
                <input type="date" name="proximo_cambio" class="form-control" value="{{ cambio.proximo_cambio }}">
            </div>
            <div class="col-md-6">
                <label for="observaciones" class="form-label">Observaciones</label>
                <input type="text" name="observaciones" class="form-control" value="{{ cambio.observaciones }}">
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Actualizar</button>
        <a href="{{ url_for('cambios_aceite') }}" class="btn btn-secondary">Cancelar</a>
    </form>
</body>
</html>
