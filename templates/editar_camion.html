<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Camión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h2>Editar Camión</h2>
    <form method="POST" action="{{ url_for('editar_camion', id=camion['id']) }}">
        <div class="mb-3">
            <label class="form-label">Placa</label>
            <input type="text" name="placa" value="{{ camion['placa'] }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Modelo</label>
            <input type="text" name="modelo" value="{{ camion['modelo'] }}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Conductor</label>
            <input type="text" name="conductor" value="{{ camion['conductor'] }}" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Fecha Adquisición</label>
            <input type="date" name="fecha_adquisicion" value="{{ camion['fecha_adquisicion'] }}" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">Actualizar</button>
        <a href="{{ url_for('index_camiones') }}" class="btn btn-secondary">Cancelar</a>
    </form>
</body>
</html>
