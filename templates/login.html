<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | APARCO CARGO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: var(--card-bg);
            backdrop-filter: var(--glass-effect);
            border: 1px solid var(--border-glow);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.1);
        }
        .login-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            background: linear-gradient(to right, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="login-card animate__animated animate__zoomIn">
        <h2 class="login-title">APARCO CARGO</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} small py-2">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-4">
                <label class="form-label text-dim small text-uppercase">Usuario</label>
                <input type="text" name="username" class="form-control" required placeholder="admin">
            </div>
            <div class="mb-4">
                <label class="form-label text-dim small text-uppercase">Contraseña</label>
                <input type="password" name="password" class="form-control" required placeholder="admin123">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">ACCEDER AL SISTEMA</button>
        </form>
        
        <div class="mt-4 text-center small text-dim">
            SISTEMA DE LOGÍSTICA PREDICTIVA v2.0
        </div>
    </div>
</body>
</html>
