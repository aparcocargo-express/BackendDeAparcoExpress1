{% extends "base.html" %}

{% block title %}Registrar Cambio de Aceite | APARCO CARGO{% endblock %}

{% block content %}
<div class="row justify-content-center animate__animated animate__fadeIn">
    <div class="col-lg-8">
        <div class="card-dashboard p-5">
            <h2 class="page-title-futuristic text-center mb-5">REGISTRO DE LUBRICANTES</h2>
            
            <form method="POST">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label text-dim small text-uppercase">Unidad / Camión</label>
                        <select name="camion_id" class="form-select" required>
                            <option value="">Seleccione una unidad...</option>
                            {% for c in camiones %}
                            <option value="{{ c.id }}">{{ c.placa }} - {{ c.modelo }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label text-dim small text-uppercase">Fecha de Servicio</label>
                        <input type="date" name="fecha" class="form-control" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label text-dim small text-uppercase">Kilometraje Actual</label>
                        <input type="number" name="kilometraje" class="form-control" placeholder="000000" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label text-dim small text-uppercase">Próximo Cambio (KM)</label>
                        <input type="number" name="proximo_cambio" class="form-control" placeholder="000000" required>
                    </div>
                    
                    <div class="col-md-12">
                        <label class="form-label text-dim small text-uppercase">Observaciones Técnicas</label>
                        <textarea name="observaciones" class="form-control" rows="3" placeholder="Detalles del lubricante, filtro, etc."></textarea>
                    </div>
                </div>

                <div class="mt-5 d-flex gap-3 justify-content-end">
                    <a href="{{ url_for('cambios_aceite') }}" class="btn btn-outline-secondary px-4">CANCELAR</a>
                    <button type="submit" class="btn btn-primary px-5">GUARDAR REGISTRO</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
