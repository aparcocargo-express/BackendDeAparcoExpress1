{% extends "base.html" %}

{% block title %}Registrar Conductor | APARCO CARGO{% endblock %}

{% block content %}
<div class="row justify-content-center animate__animated animate__fadeIn">
    <div class="col-lg-8">
        <div class="card-dashboard p-5">
            <h2 class="page-title-futuristic text-center mb-5">REGISTRO DE PERSONAL</h2>
            
            <form action="{{ url_for('agregar_conductor') }}" method="POST">
                <div class="row g-4">
                    <div class="col-md-12">
                        <label class="form-label text-dim small text-uppercase">Nombre Completo</label>
                        <input type="text" name="nombre" class="form-control" placeholder="Ej: Juan Pérez" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label text-dim small text-uppercase">DNI / Identificación</label>
                        <input type="text" name="dni" class="form-control" placeholder="8 dígitos" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label text-dim small text-uppercase">N° de Licencia</label>
                        <input type="text" name="licencia" class="form-control" placeholder="Q12345678" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label text-dim small text-uppercase">Categoría</label>
                        <select name="categoria" class="form-select" required>
                            <option value="A-I">A-I</option>
                            <option value="A-IIa">A-IIa</option>
                            <option value="A-IIb">A-IIb</option>
                            <option value="A-IIIa">A-IIIa</option>
                            <option value="A-IIIb">A-IIIb</option>
                            <option value="A-IIIc">A-IIIc</option>
                            <option value="A4">A4 (Maquinaria)</option>
                            <option value="C">C (Moto/Otros)</option>
                        </select>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label text-dim small text-uppercase">Teléfono</label>
                        <input type="text" name="telefono" class="form-control" placeholder="999 999 999" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label text-dim small text-uppercase">Vencimiento Licencia</label>
                        <input type="date" name="vencimiento" class="form-control" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label text-dim small text-uppercase">Dirección</label>
                        <input type="text" name="direccion" class="form-control" placeholder="Av. Principal 123">
                    </div>
                </div>

                <div class="mt-5 d-flex gap-3 justify-content-end">
                    <a href="{{ url_for('conductores') }}" class="btn btn-outline-secondary px-4">CANCELAR</a>
                    <button type="submit" class="btn btn-primary px-5">REGISTRAR CONDUCTOR</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
